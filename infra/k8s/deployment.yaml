apiVersion: apps/v1
kind: Deployment
metadata:
  name: convocatorias-backend
  labels:
    app: convocatorias
spec:
  replicas: 2
  selector:
    matchLabels:
      app: convocatorias
  template:
    metadata:
      labels:
        app: convocatorias
    spec:
      containers:
      - name: backend
        image: ghcr.io/convocatorias/backend:v1.0.0
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: convocatorias-config
        - secretRef:
            name: convocatorias-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: convocatorias-service
spec:
  selector:
    app: convocatorias
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP