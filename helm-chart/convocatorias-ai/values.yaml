# Default values for convocatorias-ai chart

replicaCount: 2

image:
  repository: ghcr.io/automatizacion-convocatorias/convocatorias-ai
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  ENV: production
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  PROMETHEUS_MULTIPROC: true
  
  # Circuit breaker
  CIRCUIT_FAILURE_THRESHOLD: 5
  CIRCUIT_RECOVERY_TIMEOUT: 60.0
  API_RETRY_ATTEMPTS: 3
  API_RETRY_BACKOFF: 1.0
  
  # Rate limiting
  RATE_LIMIT_REQUESTS: 100
  RATE_LIMIT_WINDOW: 60

serviceMonitor:
  enabled: true
  interval: 30s
  port: 8000
  path: /metrics

ingress:
  enabled: true
  className: nginx
  host: ai.convocatorias.io
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod

istio:
  enabled: true
  mtls: strict

probes:
  liveness:
    path: /health/live
    port: 8000
  readiness:
    path: /health/ready
    port: 8000

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL